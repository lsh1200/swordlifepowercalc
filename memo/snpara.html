	for (j = 0; j < source[i].src.length; j++) {

	sk = skillMap.get(it.name);
	req = levels[sk.bound][it.level];
	it.body = req[1] - 40
	it.frag = req[2];
	it.purple = req[3];
	it.blue = req[4];
	if (sm.get(it.name) != undefined) {
		used = Math.min(sm.get(it.name), it.body);
		sm.set(it.name, sm.get(it.name) - used);

	}
})

			}

})

			}
